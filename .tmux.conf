# Cursor Light colors for Tmux
# Based on: vpoltora/cursor-light.nvim (Cursor IDE Light theme v0.0.2)
# Palette: Background=#FCFCFC, Foreground=#141414, Keywords=#B31B3F, Functions=#DB704B,
#          Types/Constants=#206595, Comments=#6F6F6F, Numbers=#B8448B, Properties=#6049B3,
#          Built-ins=#6F9BA6, Macros=#1F8A65
set -g mode-style "fg=#FCFCFC,bg=#B31B3F"
set -g message-style "fg=#FCFCFC,bg=#B31B3F"
set -g message-command-style "fg=#FCFCFC,bg=#B31B3F"
set -g pane-border-style "fg=#6F6F6F"
set -g pane-active-border-style "fg=#206595"
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#141414,bg=#FCFCFC"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-left "#[fg=#FCFCFC,bg=#206595,bold] #S #[fg=#206595,bg=#FCFCFC,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#FCFCFC,bg=#FCFCFC,nobold,nounderscore,noitalics]#[fg=#206595,bg=#FCFCFC] #{prefix_highlight} #[fg=#6F6F6F,bg=#FCFCFC,nobold,nounderscore,noitalics]#[fg=#FCFCFC,bg=#6F6F6F] %Y-%m-%d  %I:%M %p #[fg=#6F6F6F,bg=#206595,nobold,nounderscore,noitalics]#[fg=#FCFCFC,bg=#206595,bold] #h "
setw -g window-status-activity-style "underscore,fg=#6F6F6F,bg=#FCFCFC"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#6F6F6F,bg=#FCFCFC"
setw -g window-status-format "#[fg=#FCFCFC,bg=#FCFCFC,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#FCFCFC,bg=#FCFCFC,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#FCFCFC,bg=#206595,nobold,nounderscore,noitalics]#[fg=#FCFCFC,bg=#206595,bold] #I  #W #F #[fg=#206595,bg=#FCFCFC,nobold,nounderscore,noitalics]"
set-option -s escape-time 10

bind g new-window -n 'lazygit' lazygit
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt (cmd+w)
