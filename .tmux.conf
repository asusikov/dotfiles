# =============================================================================
# TMUX CONFIGURATION
# =============================================================================

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------
# Status bar at top of window
set-option -g status-position top

# Default terminal type
set -g default-terminal "alacritty"

# Enable 24-bit true color in alacritty
set-option -ga terminal-overrides ",alacritty:Tc"

# Enable mouse mode (click to select, drag to resize)
set-option -g mouse on

# -----------------------------------------------------------------------------
# Panes
# -----------------------------------------------------------------------------
# Split pane horizontally: \
bind \\ split-window -h -c '#{pane_current_path}'

# Split pane vertically: -
bind - split-window -v -c '#{pane_current_path}'

# Split pane vertically with 10 lines: /
bind / split-window -v -l 10 -c '#{pane_current_path}'

# Resize pane with Ctrl+Shift+Arrow
bind -n C-S-Up resize-pane -U
bind -n C-S-Down resize-pane -D
bind -n C-S-Left resize-pane -L
bind -n C-S-Right resize-pane -R

# -----------------------------------------------------------------------------
# Layouts
# -----------------------------------------------------------------------------
# Switch to main-vertical layout (Ctrl+4)
bind-key -n C-4 select-layout main-vertical \; resize-p -x 120

# Resize pane to specific width
bind-key w resize-p -x 91
bind-key a resize-p -x 131

# Swap current pane with pane 0
bind-key M swap-pane -s 0

# Cycle through layouts
bind-key space next-layout

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
# Pass these env vars to child processes
set-option -g update-environment "DIRENV_DIFF DIRENV_DIR DIRENV_WATCHES"

# Unset direnv variables to avoid conflicts
set-environment -gu DIRENV_DIFF
set-environment -gu DIRENV_DIR
set-environment -gu DIRENV_WATCHES
set-environment -gu DIRENV_LAYOUT

# -----------------------------------------------------------------------------
# Colors & Styles
# -----------------------------------------------------------------------------
# Command/selection mode colors (pink/red theme)
set -g mode-style "fg=#FCFCFC,bg=#B31B3F"
set -g message-style "fg=#FCFCFC,bg=#B31B3F"
set -g message-command-style "fg=#FCFCFC,bg=#B31B3F"

# Pane border colors
set -g pane-border-style "fg=#6F6F6F,bg=default"
set -g pane-active-border-style "fg=#206595,bg=default"

# Status bar
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#141414,bg=#FCFCFC"
set -g status-left "#[fg=#FCFCFC,bg=#206595,bold] #S #[fg=#206595,bg=#FCFCFC]│"
set -g status-right "#[fg=#6F6F6F,bg=#FCFCFC]│ #[fg=#6F6F6F]#{prefix_highlight} #[fg=#6F6F6F]│ %Y-%m-%d  %I:%M %p "

# Window status in status bar
setw -g window-status-activity-style "underscore,fg=#6F6F6F,bg=#FCFCFC"
setw -g window-status-style "fg=#6F6F6F,bg=#FCFCFC"
setw -g window-status-format " #[fg=#6F6F6F,bg=#FCFCFC]#I #W "
setw -g window-status-current-format "#[fg=#FCFCFC,bg=#206595,bold] #I #W "

# Escape time for vi-mode (lower = more responsive)
set-option -s escape-time 10

# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------
# Quick access to apps in new windows
bind g new-window -n 'lazygit' lazygit
bind y new-window -n 'yazi' yazi

# Kill current pane
bind-key x kill-pane

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
# Tmux Plugin Manager
run -b '~/.tmux/plugins/tpm/tpm'
